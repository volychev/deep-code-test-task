services:
  telemetry-api:
    build: .
    env_file: ".env"
    container_name: "telemetry-api"
    command: >
      poetry run uvicorn telemetry_api.main:app
      --host ${HOST}
      --port ${PORT}
      --reload
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - "telemetry-postgres"
      - "telemetry-redis"
    networks:
      - app-net
    restart: always

  telemetry-postgres:
    image: "postgres:16"
    env_file: ".env"
    container_name: "telemetry-postgres"
    volumes:
      - "telemetry-postgres:/var/lib/postgresql/data/"
    networks:
      - app-net
    restart: always

  telemetry-redis:
    image: "redis:7-alpine"
    container_name: "telemetry-redis"
    command: "redis-server --save 60 1 --loglevel warning"
    volumes:
      - "telemetry-redis:/data"
    networks:
      - app-net
    restart: always

  telemetry-celery-worker:
    build: .
    env_file: ".env"
    container_name: "telemetry-celery-worker"
    command: "poetry run celery -A telemetry_api.worker.celery_app:celery_instance worker --loglevel=INFO"
    depends_on:
      - "telemetry-postgres"
      - "telemetry-redis"
    networks:
      - app-net
    restart: always

volumes:
  telemetry-postgres:
  telemetry-redis:

networks:
  app-net:
    external: true
